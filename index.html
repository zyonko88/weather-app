<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天気アプリ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* ── 都市切替ボタン ── */
  .city-tabs {
    display: flex;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .city-tabs button {
    padding: 8px 20px;
    border: none;
    border-radius: 100px;
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }

  .city-tabs button.active {
    background: var(--accent);
    color: #fff;
  }

  .city-tabs button:not(.active):hover {
    background: rgba(255,255,255,.07);
    color: var(--text);
  }

  /* ── メインカード ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 400px;
    padding: 36px 32px 28px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(88,166,255,.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .city-name {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .date-str {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .weather-main {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 8px;
  }

  .temp-big {
    font-size: 88px;
    font-weight: 200;
    line-height: 1;
    letter-spacing: -4px;
  }

  .temp-unit {
    font-size: 32px;
    font-weight: 300;
    margin-bottom: 12px;
    color: var(--muted);
  }

  .weather-icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-left: auto;
  }

  .weather-emoji {
    font-size: 56px;
    line-height: 1;
  }

  .weather-label {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }

  .feel-temp {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* ── 詳細グリッド ── */
  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  .detail-item {
    background: rgba(255,255,255,.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .detail-item .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 6px;
  }

  .detail-item .value {
    font-size: 22px;
    font-weight: 600;
  }

  .detail-item .value small {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    margin-left: 2px;
  }

  /* ── ローディング・エラー ── */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 40px 0;
    min-height: 220px;
    justify-content: center;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .state-box p { font-size: 14px; color: var(--muted); }

  .error-icon { font-size: 40px; }

  .updated {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin-top: 14px;
  }

  /* ── ニックネーム ── */
  .nickname-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 12px 6px 16px;
    width: 100%;
    max-width: 400px;
  }

  .nickname-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
  }

  .nickname-bar input::placeholder { color: var(--muted); }

  .nickname-bar button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s;
  }

  .nickname-bar button:hover { opacity: .85; }

  /* ── スマホ調整 ── */
  @media (max-width: 420px) {
    .temp-big { font-size: 72px; }
    .card { padding: 28px 20px 22px; }
  }

  /* ── ロック画面 ── */
  #lockScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    z-index: 100;
  }

  #lockScreen h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  #lockScreen p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    text-align: center;
  }

  .lock-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .lock-card input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }

  .lock-card input:focus { border-color: var(--accent); }

  .lock-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .2s;
  }

  .lock-btn:hover { opacity: .85; }

  .lock-btn.danger {
    background: transparent;
    color: #f85149;
    border: 1px solid #f85149;
    font-size: 12px;
    padding: 8px;
  }

  .lock-error {
    font-size: 12px;
    color: #f85149;
    text-align: center;
    min-height: 18px;
  }

  .lock-icon { font-size: 48px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- ロック画面 -->
<div id="lockScreen">
  <div class="lock-icon" id="lockIcon">🔒</div>
  <h2 id="lockTitle">パスワードを入力</h2>
  <p id="lockDesc">天気アプリにアクセスするにはパスワードが必要です</p>
  <div class="lock-card">
    <input type="password" id="pwInput" placeholder="パスワード" maxlength="50" autocomplete="current-password" />
    <input type="password" id="pwConfirm" placeholder="確認用（もう一度入力）" maxlength="50" style="display:none" autocomplete="new-password" />
    <div class="lock-error" id="lockError"></div>
    <button class="lock-btn" id="lockBtn" onclick="handleLock()">ロック解除</button>
    <button class="lock-btn danger" id="resetBtn" onclick="resetPassword()" style="display:none">パスワードをリセット（データも消去）</button>
  </div>
</div>

<h1 id="main-title">Weather</h1>

<div class="nickname-bar">
  <input type="text" id="nicknameInput" placeholder="ニックネームを入力…" maxlength="20" />
  <button onclick="saveNickname()">保存</button>
</div>

<div class="city-tabs">
  <button onclick="select('takamatsu')" id="tab-takamatsu" class="active">高松</button>
  <button onclick="select('tokyo')"     id="tab-tokyo">東京</button>
  <button onclick="select('osaka')"     id="tab-osaka">大阪</button>
</div>

<div class="card" id="card">
  <div class="state-box" id="loading">
    <div class="spinner"></div>
    <p>取得中…</p>
  </div>
  <div id="weather" style="display:none">
    <div class="city-name" id="city-name"></div>
    <div class="date-str" id="date-str"></div>
    <div class="weather-main">
      <div>
        <span class="temp-big" id="temp">--</span><span class="temp-unit">°C</span>
      </div>
      <div class="weather-icon-wrap">
        <span class="weather-emoji" id="emoji">--</span>
        <span class="weather-label" id="wlabel">--</span>
      </div>
    </div>
    <div class="feel-temp">体感 <span id="feels">--</span>°C</div>
    <div class="details">
      <div class="detail-item">
        <div class="label">湿度</div>
        <div class="value"><span id="humidity">--</span><small>%</small></div>
      </div>
      <div class="detail-item">
        <div class="label">風速</div>
        <div class="value"><span id="wind">--</span><small>km/h</small></div>
      </div>
      <div class="detail-item">
        <div class="label">降水量</div>
        <div class="value"><span id="precip">--</span><small>mm</small></div>
      </div>
      <div class="detail-item">
        <div class="label">昼夜</div>
        <div class="value"><span id="uv">--</span></div>
      </div>
    </div>
  </div>
  <div id="err-box" style="display:none">
    <div class="state-box">
      <span class="error-icon">⚠️</span>
      <p id="err-msg">エラーが発生しました</p>
    </div>
  </div>
  <div class="updated" id="updated"></div>
</div>

<script>
const CITIES = {
  takamatsu: { name: '高松',  lat: 34.34, lon: 134.05, tz: 'Asia/Tokyo' },
  tokyo:     { name: '東京',  lat: 35.68, lon: 139.69, tz: 'Asia/Tokyo' },
  osaka:     { name: '大阪',  lat: 34.69, lon: 135.50, tz: 'Asia/Tokyo' },
};

const WMO = {
  0:  ['☀️','快晴'],
  1:  ['🌤️','おおむね晴れ'],
  2:  ['⛅','一部曇り'],
  3:  ['☁️','曇り'],
  45: ['🌫️','霧'],
  48: ['🌫️','霧氷'],
  51: ['🌦️','霧雨（弱）'],
  53: ['🌦️','霧雨'],
  55: ['🌧️','霧雨（強）'],
  61: ['🌧️','小雨'],
  63: ['🌧️','雨'],
  65: ['🌧️','大雨'],
  71: ['🌨️','小雪'],
  73: ['🌨️','雪'],
  75: ['❄️','大雪'],
  77: ['🌨️','霧雪'],
  80: ['🌦️','にわか雨（弱）'],
  81: ['🌧️','にわか雨'],
  82: ['⛈️','激しいにわか雨'],
  85: ['🌨️','にわか雪'],
  86: ['❄️','激しいにわか雪'],
  95: ['⛈️','雷雨'],
  96: ['⛈️','雷雨（雹）'],
  99: ['⛈️','激しい雷雨'],
};

// ── パスワード機能 ──
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const PW_KEY = 'weather_pw_hash';

function initLockScreen() {
  const hasPassword = !!localStorage.getItem(PW_KEY);
  if (hasPassword) {
    document.getElementById('lockTitle').textContent = 'パスワードを入力';
    document.getElementById('lockDesc').textContent  = '天気アプリにアクセスするにはパスワードが必要です';
    document.getElementById('lockBtn').textContent   = 'ロック解除';
    document.getElementById('pwConfirm').style.display = 'none';
    document.getElementById('resetBtn').style.display  = 'block';
  } else {
    document.getElementById('lockIcon').textContent  = '🔑';
    document.getElementById('lockTitle').textContent = 'パスワードを設定';
    document.getElementById('lockDesc').textContent  = '初回設定です。使用するパスワードを決めてください';
    document.getElementById('lockBtn').textContent   = 'パスワードを設定する';
    document.getElementById('pwConfirm').style.display = 'block';
    document.getElementById('resetBtn').style.display  = 'none';
  }
  document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleLock(); });
  document.getElementById('pwConfirm').addEventListener('keydown', e => { if (e.key === 'Enter') handleLock(); });
}

async function handleLock() {
  const pw  = document.getElementById('pwInput').value;
  const err = document.getElementById('lockError');
  if (!pw) { err.textContent = 'パスワードを入力してください'; return; }

  const hasPassword = !!localStorage.getItem(PW_KEY);

  if (hasPassword) {
    const hash = await sha256(pw);
    if (hash === localStorage.getItem(PW_KEY)) {
      document.getElementById('lockScreen').style.display = 'none';
    } else {
      err.textContent = 'パスワードが違います';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  } else {
    const confirm = document.getElementById('pwConfirm').value;
    if (pw.length < 4) { err.textContent = '4文字以上で設定してください'; return; }
    if (pw !== confirm) { err.textContent = 'パスワードが一致しません'; return; }
    localStorage.setItem(PW_KEY, await sha256(pw));
    document.getElementById('lockScreen').style.display = 'none';
  }
}

function resetPassword() {
  const typed = document.getElementById('pwInput').value;
  if (typed !== 'RESET') {
    document.getElementById('lockError').textContent = 'リセットするには入力欄に「RESET」と入力してください';
    return;
  }
  localStorage.clear();
  location.reload();
}

initLockScreen();

// ── ここから既存コード ──
let current = 'takamatsu';

function saveNickname() {
  const name = document.getElementById('nicknameInput').value.trim();
  if (name) {
    localStorage.setItem('weather_nickname', name);
  } else {
    localStorage.removeItem('weather_nickname');
  }
  updateTitle();
}

function updateTitle() {
  const name = localStorage.getItem('weather_nickname');
  document.getElementById('main-title').textContent = name ? `${name}さんの天気` : 'Weather';
}

// 起動時に復元
(function init() {
  const saved = localStorage.getItem('weather_nickname');
  if (saved) {
    document.getElementById('nicknameInput').value = saved;
  }
  updateTitle();
})();

function setView(id) {
  document.getElementById('loading').style.display  = id==='loading' ? 'flex' : 'none';
  document.getElementById('weather').style.display  = id==='weather' ? 'block' : 'none';
  document.getElementById('err-box').style.display  = id==='err'     ? 'block' : 'none';
}

async function select(key) {
  current = key;
  Object.keys(CITIES).forEach(k => {
    document.getElementById('tab-'+k).classList.toggle('active', k===key);
  });
  setView('loading');
  document.getElementById('updated').textContent = '';

  const c = CITIES[key];
  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${c.lat}&longitude=${c.lon}`
    + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,`
    + `precipitation,weather_code,windspeed_10m,is_day`
    + `&timezone=${c.tz}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    const w = d.current;

    const code = w.weather_code;
    const [emoji, label] = WMO[code] ?? ['🌡️','不明'];

    document.getElementById('city-name').textContent = c.name;
    document.getElementById('date-str').textContent  = fmtDate(w.time);
    document.getElementById('temp').textContent      = Math.round(w.temperature_2m);
    document.getElementById('feels').textContent     = Math.round(w.apparent_temperature);
    document.getElementById('emoji').textContent     = emoji;
    document.getElementById('wlabel').textContent    = label;
    document.getElementById('humidity').textContent  = w.relative_humidity_2m;
    document.getElementById('wind').textContent      = Math.round(w.windspeed_10m);
    document.getElementById('precip').textContent    = w.precipitation.toFixed(1);
    document.getElementById('uv').textContent        = w.is_day ? '☀️ 昼' : '🌙 夜';
    document.getElementById('updated').textContent   =
      '更新 ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});

    setView('weather');
  } catch(e) {
    let msg = e.message || '不明なエラー';
    if (e instanceof TypeError && msg.includes('fetch')) {
      msg = 'ネットワークに接続できません。インターネット接続を確認してください。';
    }
    document.getElementById('err-msg').textContent = msg;
    setView('err');
  }
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}

select('takamatsu');
</script>
</body>
</html>
